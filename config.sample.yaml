# Tater Tube Server sample configuration

# Server bind settings for the web UI and API.
server:
  host: '0.0.0.0'
  port: 8080

auth:
  login_required: false

database:
  type: 'sqlite'
  path: '/config/tater-tube-server.db'

metadata:
  root_path: '/config/metadata'
  delete_source_nzb_on_removal: true

providers:
  - id: 'primary'
    name: 'Primary Usenet'
    host: 'news.example.com'
    port: 563
    tls: true
    username: ''
    password: ''
    max_connections: 10
    enabled: true

streaming:
  max_prefetch: 4

transcoding:
  enabled: false
  profile: 'crt_480p'
  hardware_acceleration: 'none'
  ffmpeg_path: 'ffmpeg'
  hardware_device: ''

newznab:
  enabled: false
  url: ''
  api_key: ''
  username: ''
  browse_limit: 100

local_media:
  enabled: false
  categories: []
  # library_type can be:
  # - movies: recursively scans video files and shows clean movie titles
  # - tv: browses Show -> Season -> Episode folders
  # - folders: preserves the raw folder structure
  # Example:
  # categories:
  #   - id: 'movies'
  #     name: 'Movies'
  #     library_type: 'movies'
  #     paths:
  #       - '/media/movies'
  #     enabled: true

players:
  paired: []
  pairing_codes: []

import:
  max_processor_workers: 2
  max_unpack_workers: 2
  import_strategy: 'strm'
  import_dir: '/config/imports'

segment_cache:
  enabled: true
  cache_path: '/config/segment-cache'
  max_size_gb: 10
  expiry_hours: 168

log:
  level: 'info'
  file: '/config/tater-tube-server.log'
