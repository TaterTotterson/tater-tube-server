name: Cleanup GHCR

on:
  workflow_dispatch:
    inputs:
      keep_tag:
        description: 'Container tag to keep'
        required: true
        default: latest
      dry_run:
        description: 'List what would be deleted without deleting'
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker login (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Delete package versions without kept tag
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ github.event.repository.name }}
          KEEP_TAG: ${{ inputs.keep_tag }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          package_lc="$(printf '%s' "$PACKAGE" | tr '[:upper:]' '[:lower:]')"
          owner_lc="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lc}/${package_lc}"
          versions_json="$(mktemp)"
          keep_digests="$(mktemp)"
          gh api --paginate "/users/${OWNER}/packages/container/${package_lc}/versions?per_page=100" > "$versions_json"

          docker buildx imagetools inspect "${image}:${KEEP_TAG}" --raw \
            | jq -r '.manifests[]?.digest // empty' \
            > "$keep_digests"

          keep_id="$(
            jq -r --arg keep_tag "$KEEP_TAG" '
              map(select((.metadata.container.tags // []) | index($keep_tag)))
              | sort_by(.updated_at)
              | reverse
              | .[0].id // empty
            ' "$versions_json"
          )"

          if [ -z "$keep_id" ]; then
            echo "No GHCR package version currently has tag '$KEEP_TAG'. Refusing to delete anything."
            jq -r '.[] | "\(.id)\t\((.metadata.container.tags // []) | join(","))\t\(.updated_at)"' "$versions_json"
            exit 1
          fi

          echo "Keeping package version ${keep_id} with tag '${KEEP_TAG}'"

          delete_count=0
          jq -r '.[] | [.id, .name, ((.metadata.container.tags // []) | join(","))] | @tsv' "$versions_json" \
            | while IFS=$'\t' read -r version_id version_name tags; do
            [ -z "$version_id" ] && continue

            keep_reason=""
            if [ "$version_id" = "$keep_id" ]; then
              keep_reason="${KEEP_TAG}"
            fi

            case ",${tags}," in
              *",${KEEP_TAG},"*) keep_reason="${KEEP_TAG}" ;;
            esac

            digest_name="$version_name"
            digest_hash="${version_name#sha256:}"
            if grep -Fxq "$digest_name" "$keep_digests" || grep -Fxq "sha256:${digest_hash}" "$keep_digests"; then
              keep_reason="manifest-child"
            fi

            if [ -n "$keep_reason" ]; then
              echo "Keeping package version ${version_id} name=[${version_name}] tags=[${tags}] reason=[${keep_reason}]"
              continue
            fi

            delete_count=$((delete_count + 1))
            if [ "$DRY_RUN" = "true" ]; then
              echo "Would delete package version ${version_id} name=[${version_name}] tags=[${tags}]"
            else
              echo "Deleting package version ${version_id} name=[${version_name}] tags=[${tags}]"
              gh api --method DELETE "/users/${OWNER}/packages/container/${package_lc}/versions/${version_id}"
            fi
          done
