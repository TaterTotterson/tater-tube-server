name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
      skip_docker:
        description: 'Skip Docker image build (use when images already exist)'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/test

  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Extract version info for frontend
        id: frontend-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: frontend
        env:
          npm_package_version: ${{ steps.frontend-version.outputs.version }}
          GIT_COMMIT: ${{ steps.frontend-version.outputs.commit }}
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v6
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  prepare-release:
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.release_tag }}
          GENERATE_NOTES: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            if [ -f "$NOTES_FILE" ]; then
              gh release edit "$TAG" --notes-file "$NOTES_FILE"
            fi
          else
            if [ -f "$NOTES_FILE" ]; then
              gh release create "$TAG" --title "Tater Tube Server $TAG" --notes-file "$NOTES_FILE"
            elif [ "$GENERATE_NOTES" = "true" ]; then
              gh release create "$TAG" --title "Tater Tube Server $TAG" --generate-notes
            else
              gh release create "$TAG" --title "Tater Tube Server $TAG"
            fi
          fi

  build-image:
    name: Build Docker Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare-release, build-frontend]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_docker }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Normalize image name
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker login (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.ci
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.title=Tater Tube Server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.version }}
          cache-from: type=gha,scope=release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.arch }}
          provenance: false
          sbom: false
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ needs.prepare-release.outputs.version }}
            COMMIT=${{ needs.prepare-release.outputs.commit }}

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v6
        with:
          name: image-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: build-image
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_docker }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          pattern: image-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Normalize image name
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker login (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest multi-arch tag
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}"
          refs=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            refs+=("${image}@sha256:${digest}")
          done
          printf 'Publishing %s:latest from digests:\n' "$image"
          printf '  %s\n' "${refs[@]}"
          docker buildx imagetools create -t "${image}:latest" "${refs[@]}"
