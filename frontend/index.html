<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#090909" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#090909" />
    <title>Tater Tube Server</title>
    <meta name="description" content="A Tater-themed Usenet streaming bridge for Stremio." />
    <!-- Theme detection script - must run before React -->
    <script>
      (function() {
        // Check if user has a saved preference
        const savedTheme = localStorage.getItem('theme');

        // Check system preference
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        // Apply theme: saved preference > system preference > default (retro)
        const theme = savedTheme || 'tater';
        document.documentElement.setAttribute('data-theme', theme);

        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (!localStorage.getItem('theme')) {
            // Only auto-switch if user hasn't set a manual preference
            document.documentElement.setAttribute('data-theme', 'tater');
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
